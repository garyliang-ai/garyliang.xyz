<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} – {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Site.Params.description }}">
{{ $bp := (urls.Parse .Site.BaseURL).Path | default "/" }}
<link rel="icon" type="image/png" sizes="32x32" href="{{ $bp }}images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="{{ $bp }}images/favicon-192x192.png">
<link rel="apple-touch-icon" href="{{ $bp }}images/apple-touch-icon.png">
<style>
  :root {
    --font-sans: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --max-width: 720px;
    --color-text: #1a1a1a;
    --color-link: #0066cc;
    --color-muted: #666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    color: var(--color-text);
    line-height: 1.7;
    font-size: 16px;
    padding: 0 20px;
    max-width: var(--max-width);
    margin: 0 auto;
  }
  header {
    padding: 40px 0 20px;
    border-bottom: 1px solid #eee;
    margin-bottom: 30px;
  }
  header h1 { font-size: 1.4em; font-weight: 700; }
  header h1 a { color: inherit; text-decoration: none; }
  nav { margin-top: 8px; }
  nav a {
    color: var(--color-muted);
    text-decoration: none;
    margin-right: 16px;
    font-size: 0.95em;
  }
  nav a:hover { color: var(--color-text); }
  nav a.active { color: var(--color-text); font-weight: 500; }
  main { padding-bottom: 60px; }
  h2 { font-size: 1.3em; margin: 1.8em 0 0.6em; font-weight: 600; }
  h3 { font-size: 1.1em; margin: 1.5em 0 0.5em; font-weight: 600; }
  h4 { font-size: 1em; margin: 1.2em 0 0.4em; font-weight: 600; }
  p { margin-bottom: 1em; }
  a { color: var(--color-link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  strong { font-weight: 600; }
  ul, ol { margin: 0 0 1em 1.5em; }
  li { margin-bottom: 0.4em; }
  li ul, li ol { margin-top: 0.4em; margin-bottom: 0.4em; }
  hr { border: none; border-top: 1px solid #ddd; margin: 2em 0; }
  footer {
    border-top: 1px solid #eee;
    padding: 20px 0;
    color: var(--color-muted);
    font-size: 0.85em;
  }
  .figure-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 1.5em 0;
  }
  .figure-row figure { flex: 1; min-width: 150px; max-width: 240px; }
  figure {
    margin: 1.5em auto;
    text-align: center;
  }
  figure img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  figcaption {
    font-size: 0.85em;
    color: var(--color-muted);
    margin-top: 6px;
    line-height: 1.4;
  }
  table {
    border-collapse: collapse;
    margin: 1em auto;
    font-size: 0.95em;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 6px 12px;
    text-align: center;
  }
  th { font-weight: 600; background: #f9f9f9; }
  .example-box {
    background: #f9f9f9;
    border: 1px solid #eee;
    border-radius: 4px;
    padding: 20px;
    margin: 1.5em 0;
  }
  .example-box h4 { margin-top: 0; }
  .example-columns {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .example-columns > :first-child { flex: 2; }
  .example-columns > :last-child { flex: 1; min-width: 150px; }
  @media (max-width: 600px) {
    .figure-row { flex-direction: column; align-items: center; }
    .example-columns { flex-direction: column; }
  }
</style>
{{ if .Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '\\(', right: '\\)', display: false},
      {left: '$', right: '$', display: false}
    ],
    throwOnError: false
  });"></script>
{{ end }}
