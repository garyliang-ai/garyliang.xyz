<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header>
    {{ $bp := (urls.Parse .Site.BaseURL).Path | default "/" }}
    <h1><a href="{{ $bp }}">Gary Liang</a></h1>
    <nav>
      <a href="{{ $bp }}" {{ if .IsHome }}class="active"{{ end }}>Home</a>
      <a href="{{ $bp }}stuff/" {{ if eq .RelPermalink "/stuff/" }}class="active"{{ end }}>Stuff</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    &copy; {{ now.Year }} Gary Liang
    &middot; <a href="https://twitter.com/_garyliang">X</a>
    &middot; <a href="https://www.linkedin.com/in/lianggary/">LinkedIn</a>
  </footer>
</body>
</html>
